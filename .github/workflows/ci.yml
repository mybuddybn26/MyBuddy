name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  WS: run-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      fastify: ${{ steps.filter.outputs.fastify }}
      vitejs: ${{ steps.filter.outputs.vitejs }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: ${{ env.WS }}
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          working-directory: ${{ env.WS }}
          filters: |
            fastify:
              - 'fastify/**'
            vitejs:
              - 'vitejs/**'

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          path: ${{ env.WS }}
      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source ${{ env.WS }} --no-git --no-banner --redact --exit-code 1
      - run: python3 ${{ env.WS }}/scripts/style-check.py ${{ env.WS }}/vitejs/src

  fastify:
    name: Fastify (format + lint + typecheck + build + audit)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.fastify == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ${{ env.WS }}/fastify
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      JWT_SECRET: ci-test-secret # gitleaks:allow
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: ${{ env.WS }}
      - uses: pnpm/action-setup@d2e80c2cd4ed53a7e3ed31819a0e30af5c7d63ab # v6
        with:
          version: 9
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.WS }}/fastify/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx drizzle-kit push --force
      - run: npx prettier --check .
      - run: npx eslint .
      - run: npx tsc --noEmit
      - run: pnpm run build
      - run: pnpm audit --omit=dev

  vitejs:
    name: React + Vite (format + lint + typecheck + build + audit)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.vitejs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WS }}/vitejs
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: ${{ env.WS }}
      - uses: pnpm/action-setup@d2e80c2cd4ed53a7e3ed31819a0e30af5c7d63ab # v6
        with:
          version: 9
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.WS }}/vitejs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx prettier --check .
      - run: npx eslint 'src/**/*.{ts,tsx}'
      - run: npx tsc --noEmit
      - run: pnpm run build
      - run: bash scripts/check-bundle-size.sh
      # Validates frontend/nginx.conf against the same nginx image the Dockerfile
      # uses. Catches unknown / module-dependent directives (e.g. `brotli on;` on
      # stock nginx:alpine) BEFORE deploy — without it, the directive only fails
      # when the container tries to start in prod, after CI is green.
      #
      # GOTCHA: if you convert this job to self-hosted runners (shared outbound
      # IP), `docker run` against `public.ecr.aws/...` will fall back to anonymous
      # pulls and hit rate limits across concurrent runs. Add OIDC + ECR Public
      # login steps before this step (see memoria/.github/workflows/ci.yml).
      - name: Validate nginx config against runtime image
        working-directory: ${{ env.WS }}
        run: bash scripts/validate-nginx-config.sh
