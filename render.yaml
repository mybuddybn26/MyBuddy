# Render Blueprint — Buddy production deployment
# https://render.com/docs/blueprint-spec
#
# Deploy: push to GitHub → Render auto-deploys via Blueprint.
#
# Services:
#   buddy-api    — Fastify backend web service (free tier)
#   buddy-app    — Vite + React static site (free tier)
#
# Database: create a Neon PostgreSQL project separately → set DATABASE_URL env var.

services:
  # ─── Backend API ───
  - type: web
    name: buddy-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: cd fastify && pnpm install --frozen-lockfile && pnpm build
    startCommand: cd fastify && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: CRED_ENCRYPTION_KEY
        sync: false
    autoDeploy: true

  # ─── Frontend Static Site ───
  - type: static
    name: buddy-app
    runtime: node
    plan: free
    region: singapore
    buildCommand: cd vitejs && pnpm install --frozen-lockfile && pnpm build
    publishPath: vitejs/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
